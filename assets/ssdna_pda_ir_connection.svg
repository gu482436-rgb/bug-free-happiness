<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="540" viewBox="0 0 1180 540" role="img" aria-labelledby="title desc">
  <title id="title">Amino-modified ssDNA immobilization on CoFe2O4@PDA@Ir</title>
  <desc id="desc">Schematic explaining how NH2-C6 modified ssDNA is immobilized onto exposed polydopamine sites on CoFe2O4@PDA@Ir, while dispersed Ir nanoparticles retain peroxidase-like activity.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#285f86"/>
    </marker>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#1f2933" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1180" height="540" fill="#ffffff"/>
  <text x="44" y="48" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="28" font-weight="700" fill="#183b56">NH₂-C6-ssDNA 与 CoFe₂O₄@PDA@Ir 的连接逻辑</text>
  <text x="44" y="80" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="16" fill="#667085">关键点：Ir 为分散颗粒状负载，PDA 保留暴露位点；NH₂-C6-ssDNA 通过 PDA 表面醌/儿茶酚相关反应固定</text>

  <g transform="translate(55,132)" filter="url(#softShadow)">
    <rect x="0" y="0" width="310" height="320" rx="18" fill="#f5f7fa" stroke="#d9dee7"/>
    <text x="24" y="40" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="18" font-weight="700" fill="#0f3d5c">1. 三层纳米酶表面</text>
    <circle cx="140" cy="162" r="64" fill="#263238"/>
    <circle cx="140" cy="162" r="84" fill="none" stroke="#8b5e3c" stroke-width="15"/>
    <g fill="#6d7f8f">
      <circle cx="70" cy="110" r="8"/><circle cx="112" cy="76" r="7"/><circle cx="166" cy="74" r="8"/>
      <circle cx="212" cy="104" r="7"/><circle cx="231" cy="158" r="8"/><circle cx="210" cy="215" r="7"/>
      <circle cx="158" cy="252" r="8"/><circle cx="99" cy="238" r="7"/><circle cx="58" cy="190" r="8"/>
    </g>
    <text x="36" y="282" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="15" fill="#1f2933">黑色：CoFe₂O₄ 磁核</text>
    <text x="36" y="306" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="15" fill="#1f2933">棕色：PDA；灰蓝色：分散 Ir</text>
  </g>

  <line x1="390" y1="292" x2="485" y2="292" stroke="#285f86" stroke-width="3" marker-end="url(#arrow)"/>

  <g transform="translate(505,132)" filter="url(#softShadow)">
    <rect x="0" y="0" width="310" height="320" rx="18" fill="#f5f7fa" stroke="#d9dee7"/>
    <text x="24" y="40" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="18" font-weight="700" fill="#0f3d5c">2. NH₂-C6-ssDNA 固定</text>
    <circle cx="108" cy="164" r="48" fill="#263238"/>
    <circle cx="108" cy="164" r="62" fill="none" stroke="#8b5e3c" stroke-width="11"/>
    <g fill="#6d7f8f">
      <circle cx="55" cy="122" r="6"/><circle cx="105" cy="96" r="6"/><circle cx="160" cy="125" r="6"/>
      <circle cx="159" cy="199" r="6"/><circle cx="91" cy="229" r="6"/><circle cx="48" cy="174" r="6"/>
    </g>
    <path d="M157 117 C193 84, 231 99, 265 126" fill="none" stroke="#2f7d68" stroke-width="4"/>
    <circle cx="157" cy="117" r="5" fill="#0f3d5c"/>
    <text x="176" y="85" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="14" fill="#1f2933">NH₂-C6-ssDNA</text>
    <text x="178" y="126" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="13" fill="#1f2933">Schiff base / Michael addition</text>
    <text x="34" y="272" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="15" fill="#1f2933">C6 spacer 使识别序列远离材料表面</text>
    <text x="34" y="296" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="15" fill="#1f2933">Mg²⁺ 可降低核酸负电排斥并促进固定</text>
  </g>

  <line x1="840" y1="292" x2="935" y2="292" stroke="#285f86" stroke-width="3" marker-end="url(#arrow)"/>

  <g transform="translate(955,132)" filter="url(#softShadow)">
    <rect x="0" y="0" width="185" height="320" rx="18" fill="#f5f7fa" stroke="#d9dee7"/>
    <text x="22" y="40" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="18" font-weight="700" fill="#0f3d5c">3. 结果验证</text>
    <rect x="28" y="70" width="130" height="42" rx="8" fill="#eef8f4" stroke="#b7ddcf"/>
    <text x="93" y="97" text-anchor="middle" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="14" fill="#1f2933">FAM 固定量</text>
    <rect x="28" y="130" width="130" height="42" rx="8" fill="#eef3f8" stroke="#bdd0e2"/>
    <text x="93" y="157" text-anchor="middle" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="14" fill="#1f2933">Zeta / P 2p</text>
    <rect x="28" y="190" width="130" height="42" rx="8" fill="#fff8e8" stroke="#e2c46f"/>
    <text x="93" y="217" text-anchor="middle" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="14" fill="#1f2933">A652 活性保留</text>
    <text x="30" y="278" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="14" fill="#1f2933">固定后仍可磁分离、</text>
    <text x="30" y="300" font-family="Arial, 'Noto Sans SC', sans-serif" font-size="14" fill="#1f2933">洗涤后荧光和活性稳定</text>
  </g>
</svg>
